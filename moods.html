<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>¿Cómo te sientes? 💭</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FDF6F0;--surface:#fff;
  --pink:#F4A7B9;--pink-d:#E07A9A;
  --lila:#C9B8E8;--lila-d:#9B7FD4;
  --text:#2D2230;--text2:#7A6875;--text3:#B5A8B0;
  --radius:20px;--shadow:0 4px 24px rgba(180,120,160,.12);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);overscroll-behavior:none;}
.shell{max-width:390px;height:100dvh;margin:0 auto;display:flex;flex-direction:column;overflow:hidden;position:relative;}

/* SCREENS */
.screen{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .28s ease,transform .28s ease;transform:translateY(12px);}
.screen.active{opacity:1;pointer-events:all;transform:translateY(0);}
.inner{flex:1;overflow-y:auto;padding:1.5rem 1.4rem 2.5rem;}
.inner::-webkit-scrollbar{display:none;}

/* BACK ROW */
.top-row{display:flex;align-items:center;gap:.9rem;margin-bottom:1.5rem;}
.back-btn{width:40px;height:40px;border-radius:50%;background:var(--surface);box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;flex-shrink:0;border:none;text-decoration:none;color:var(--text);}
.top-meta{flex:1;}
.top-kicker{font-size:.66rem;letter-spacing:.13em;text-transform:uppercase;color:var(--text3);}
.top-title{font-family:'DM Serif Display',serif;font-size:1.5rem;color:var(--text);line-height:1.15;}
.top-title em{font-style:italic;color:var(--pink-d);}

/* ── MOODS GRID ── */
.moods-intro{font-size:.88rem;color:var(--text2);line-height:1.65;margin-bottom:1.5rem;}
.moods-grid{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;}
.mood-btn{border:none;border-radius:18px;padding:1.2rem 1rem 1.1rem;cursor:pointer;text-align:left;display:flex;flex-direction:column;gap:.4rem;transition:transform .15s;box-shadow:0 2px 10px rgba(180,120,160,.08);}
.mood-btn:active{transform:scale(.95);}
.mood-emoji{font-size:1.75rem;line-height:1;}
.mood-name{font-family:'DM Serif Display',serif;font-size:1rem;color:var(--text);}
.mood-hint{font-size:.71rem;color:var(--text2);line-height:1.35;}
.m-happy{background:linear-gradient(135deg,#FDE9C8,#FAE3A0);}
.m-sad{background:linear-gradient(135deg,#D6E8F8,#B8D8F0);}
.m-anxious{background:linear-gradient(135deg,#EAD8F8,#C9B8E8);}
.m-insecure{background:linear-gradient(135deg,#F8D6E8,#F4A7B9);}
.m-tired{background:linear-gradient(135deg,#D6F0E8,#C8E6DA);}
.m-miss{background:linear-gradient(135deg,#F8E0EC,#FDDCCC);}
.m-angry{background:linear-gradient(135deg,#F8D6D6,#F4B8B8);grid-column:span 2;}

/* ── MSG LIST ── */
.msg-cards{display:flex;flex-direction:column;gap:.75rem;}
.msg-card{background:var(--surface);border-radius:14px;padding:1.1rem 1.3rem;box-shadow:var(--shadow);cursor:pointer;transition:transform .15s;}
.msg-card:active{transform:scale(.98);}
.msg-card-num{font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:.3rem;}
.msg-card-preview{font-family:'DM Serif Display',serif;font-style:italic;font-size:.95rem;color:var(--text);line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.msg-card-arrow{font-size:.75rem;color:var(--text3);margin-top:.5rem;}

/* ── MSG DETAIL ── */
.msg-hero{border-radius:var(--radius);padding:1.8rem 1.5rem;text-align:center;margin-bottom:1.1rem;}
.msg-hero-emoji{font-size:2.6rem;margin-bottom:.4rem;}
.msg-hero-label{font-family:'DM Serif Display',serif;font-size:1rem;color:var(--text);opacity:.7;}
.bubble{background:var(--surface);border-radius:18px 18px 18px 4px;padding:1.3rem 1.4rem;box-shadow:var(--shadow);}
.bubble p{font-family:'DM Serif Display',serif;font-style:italic;font-size:1rem;line-height:1.85;color:var(--text);}
.bubble p+p{margin-top:.85rem;}
.bubble-sig{font-family:'DM Sans',sans-serif;font-style:normal;font-size:.78rem;color:var(--pink-d);font-weight:500;margin-top:.85rem;}
.nav-btns{display:flex;gap:.65rem;margin-top:1rem;}
.nbtn{flex:1;border:none;border-radius:12px;padding:.8rem;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:500;cursor:pointer;}
.nbtn:disabled{opacity:.28;cursor:default;}
.nbtn.prev{background:var(--surface);color:var(--text2);box-shadow:var(--shadow);}
.nbtn.next{background:linear-gradient(135deg,var(--pink),var(--lila));color:#fff;}
</style>
</head>
<body>
<div class="shell">

  <!-- ══ MOODS ══ -->
  <div class="screen active" id="s-moods">
    <div class="inner" style="padding-top:2.5rem;">
      <div class="top-row">
        <a class="back-btn" href="index.html">←</a>
        <div class="top-meta">
          <div class="top-kicker">mensajes</div>
          <div class="top-title">¿Cómo estás<br>hoy, <em>Nicole</em>?</div>
        </div>
      </div>
      <p class="moods-intro">Elige cómo te sientes y tengo algo para ti 💕</p>
      <div class="moods-grid">
        <button class="mood-btn m-happy"   onclick="openMood('happy')"><span class="mood-emoji">😊</span><span class="mood-name">Feliz</span><span class="mood-hint">Cuando todo va bien</span></button>
        <button class="mood-btn m-sad"     onclick="openMood('sad')"><span class="mood-emoji">😔</span><span class="mood-name">Triste</span><span class="mood-hint">Cuando algo duele</span></button>
        <button class="mood-btn m-anxious" onclick="openMood('anxious')"><span class="mood-emoji">😰</span><span class="mood-name">Ansiosa</span><span class="mood-hint">Cuando todo agobia</span></button>
        <button class="mood-btn m-insecure"onclick="openMood('insecure')"><span class="mood-emoji">🥺</span><span class="mood-name">Insegura</span><span class="mood-hint">Cuando el miedo aparece</span></button>
        <button class="mood-btn m-tired"   onclick="openMood('tired')"><span class="mood-emoji">😴</span><span class="mood-name">Cansada</span><span class="mood-hint">Sin energía</span></button>
        <button class="mood-btn m-miss"    onclick="openMood('miss')"><span class="mood-emoji">💕</span><span class="mood-name">Me extrañas</span><span class="mood-hint">Cuando quieres hablar</span></button>
        <button class="mood-btn m-angry"   onclick="openMood('angry')"><span class="mood-emoji">😤</span><span class="mood-name">Enojada</span><span class="mood-hint">Conmigo (¿?), con el mundo, con quien sea</span></button>
      </div>
    </div>
  </div>

  <!-- ══ MSG LIST ══ -->
  <div class="screen" id="s-list">
    <div class="inner">
      <div class="top-row">
        <button class="back-btn" onclick="show('s-moods')">←</button>
        <div class="top-meta">
          <div class="top-kicker" id="ml-kicker"></div>
          <div class="top-title" id="ml-title"></div>
        </div>
      </div>
      <div class="msg-cards" id="ml-cards"></div>
    </div>
  </div>

  <!-- ══ MSG DETAIL ══ -->
  <div class="screen" id="s-detail">
    <div class="inner" id="det-inner">
      <div class="top-row">
        <button class="back-btn" onclick="show('s-list')">←</button>
        <div class="top-meta">
          <div class="top-kicker" id="det-num"></div>
          <div class="top-title" id="det-moodname"></div>
        </div>
      </div>
      <div class="msg-hero" id="det-hero">
        <div class="msg-hero-emoji" id="det-emoji"></div>
        <div class="msg-hero-label" id="det-label"></div>
      </div>
      <div class="bubble" id="det-bubble"></div>
      <div class="nav-btns">
        <button class="nbtn prev" id="btn-prev" onclick="navMsg(-1)">← Anterior</button>
        <button class="nbtn next" id="btn-next" onclick="navMsg(1)">Siguiente →</button>
      </div>
    </div>
  </div>

</div>
<script>
const MOODS = {
  happy:{name:'Feliz',emoji:'😊',color:'linear-gradient(135deg,#FDE9C8,#FAE3A0)',msgs:[
    {body:['De verdad, verte sonreír una de las cosas más bonitas de mi día... Se que nos vemos muy pocas veces pero eso no importa, no importa cuanto tiempo tenga que esperar con tal de verte sonreír de verdad... Siento una tranquilidad enorme y me recuerda lo mucho que valoro tenerte en mi vida. Mi meta siempre va a ser sumarte... ser un lugar seguro para ti y hacer todo lo posible para que esa alegría te dure el mayor tiempo posible... porque te mereces todo lo bueno del mundo...'],sig:'Siempre seré tuyo.. ✦'},
    {body:['Me da risa y a la vez me encanta que te rías de mis chistes malos... aunque a veces sean súper repetitivos o aburridos lol... de verdad valoro un montón que me sigas la corriente... Ver cómo te ríes de esas tonterías... no sé, me hace sentir una desconexión total, como si en ese momento exacto nada más importara... y me di cuenta de que escuchar tu risa genuina... es por lejos mi parte favorita de estar contigo...'],sig:'Enserio me encanta tu risa.. ✦'},
    {body:['No se como lo haces... literal cambias por completo mi vida, los días por más pesados, estresantes o malos que hayan sido... verte así, tranquila y sonriendo... hace que me olvide de todo lo demás... Te ves tan bonita cuando andas con ese humor jsjksk.. que me dan ganas de detener el tiempo ahí mismo... De verdad, por peor que esté todo afuera... tú siempre me haces más feliz... y me quedo pensando en lo afortunado que soy...'],sig:'Tengo mucha suerte de tenerte junto a mi..✦'},
    {body:['Me cambia por completo el ánimo cuando me llega un mensaje tuyo y noto que estás de buen humor... aunque estemos lejos y no pueda verte en persona... leer que estás teniendo un buen día me saca una sonrisa... Me da mucha calma saber que estas bien... y me dan ganas de dejar todo lo que estoy haciendo para ponerme a hablar contigo... Aunque no haya tema de conversación.. simplemente quiero estar compartiendo nuestras cosas.. Te amo...'],sig:'Seré feliz sabiendo que tu tambien lo eres.. ✦'},
    {body:['Me hace muchísima ilusión imaginar todo lo que nos falta... no solo el plan de vivir juntos en Barranco con nuestro gato naranja waton y ponerle Empanada KJAJKS... sino también todo lo que viene antes... Tengo muchísimas ganas de seguir conociéndote más... descubrir tus gustos nuevos, tus manías, ver cómo reaccionas a cosas que aún no te he contado... de verdad me emociona demasiado todo lo que nos falta por vivir juntos... y saber que cada día voy a descubrir algo nuevo de ti...'],sig:'No olvidé el detalle del gato naranja xD ✦'},
    {body:['Me encanta lo única que eres conmigo... la forma en que me escuchas, tus detalles y cómo logras que me sienta en total confianza... Valoro muchísimo que seas tan auténtica... que no tengamos que aparentar nada cuando estamos hablando... Me fascina esa combinación que tienes entre ser tierna y a la vez tener las cosas claras... Es por lejos mi parte favorita de tu personalidad... y lo que me hace saber que eres tú con quien quiero compartir mis días el resto de mi vida...'],sig:'Si, eres tierna..✦'},
    {body:['Admiro muchísimo la fuerza que tienes para hacer tus cosas... y ver cómo eres me motiva un montón a mí también... De verdad... tu amor provoca algo muy fuerte en mí... Te prometí que iria cambiando mis malos hábitos... de mejorar cada día solo para darte la versión que te mereces, para que algún día estés orgullosa de mi y puedas decir "Wao, tengo un novio increíble" … No solo me encantas... sino que me llenas de orgullo... y me hace feliz saber que me inspiras a ser una mejor persona...'],sig:'Se me hará dificil, pero lo haré :3 ✦'},
    {body:['No te imaginas lo mucho que me gustas físicamente... Cada detalle tuyo me gusta mucho...  Tu sonrisa, la forma en que me miras... De verdad me gustas mucho jksjks, eres tan linda... No se que tan raro suene, pero no dejo de ver las fotos que me mandaste :c .. Siempre me quedo pensando en la última vez que nos vimos... y me sigo sorprendiendo de lo hermosa que eres... Para mí... eres por lejos la chica más linda de todas... y nadie me hará pensar lo contrario... (Ni siquiera tu :b)'],sig:'De verdad, eres muy hermosa.. ✦'},
    {body:['Sabias que cuando tú estás feliz, de verdad que a mí se me nota al instante... Es como si tu buena energía se me pegara por completo... Si tú sonríes o te pasa algo lindo, automáticamente a mí también me cambia el humor y me pongo feli, de buen humor y ajam... Me encanta saber que tenemos esa conexión... que tu felicidad se contagia tan fácil y que me alegres el día entero... :3'],sig:'¿Ya te dije cuanto me gusta tu sonrisa? Jej :b✦'},
    {body:['Mi amor, una preguntita tímida.. ¿sabes qué le dice un pan a otro pan? Te presento a una amiga XDD .. o tmb ¿sabes qué le dice un pollito a otro pollito? Necesitamos ayuda... BAJKSKJ de verdad no puedo con estos chistes... me da demasiada risa que siempre te los diga y que igual nos terminemos riendo de estas tonterías... Me encanta que seamos tan graciosos cuando estamos de buen humor..'],sig:'JKAJKSA, tenia que poner algo menos serio ✦'},
    {body:['Cada vez que me acuerdo de cuando nos quedamos hablando por horas en vc o cuando escucho esa canción que me hace pensar en ti mientras voy en el metropolitano.. me sale una sonrisa de idiota JKASJK.. Me pongo a recordar las caras que pones, lo bien que la pasamos y lo rápido que se nos va el tiempo cuando estamos juntos... Esos momentos son mis favoritos por lejos y siempre que tengo un día pesado me acuerdo de eso y me cambia todo...'],sig:'Me da pena cuando pongo esas caras en el bus ✦'},
    {body:['Hay algo que creo que nunca te he dicho en voz alta (me da pena sjks, ya se me pasará)... pero cada vez que te veo feliz o te noto súper emocionada por algo, me quedo pensando en lo afortunado que soy de tenerte a mi lado... Me da una paz increíble verte así y me prometo a mí mismo hacer todo lo posible para que esa felicidad te dure siempre... Es algo que se me pasa por la cabeza cada vez que sonríes...'],sig:'Nunca dejes de sonreir :c ✦'},
    {body:['Me hace muchísima ilusión pensar en el futuro y en todas las cosas que vamos a celebrar juntos... Me imagino el día en que por fin cumplamos nuestras metas, cuando celebremos que terminamos nuestros estudios o el momento exacto en que estemos viviendo en nuestra propia casita ahhh :cc, NUESTRO MATRIMONIOOO... Sé que nos faltan muchas cosas por vivir, pero me emociona un montón saber que cada logro que venga lo vamos a festejar juntos...'],sig:'Me emocione bastante escribiendo esto jksak.. ✦'},
    {body:['De vdd me encanta verte cuando estás feliz... me encanta cuando te ríes tímidamente y te cubres el rostro... sé que tal vez te da un poco de pena, pero a mí enserio me encanta verte y escucharte en esos momentos :cc ... Me quedo como tonto mirándote y pensando en que raios hice  para tener a una novia tan increible, tan hermosa y taaaaan cool... Esos pequeños detalles tuyos son mis favoritos y hacen que verte feli sean de mis mejores recuerdos contigo...'],sig:'No cambiaria eso por nada del mundo ✦'},
    {body:['Para cerrar esta parte... solo quiero que sepas que tu felicidad es mi prioridad y verte bien me alegra la vida entera... Todo lo que escribí aquí son cosas que me salieron del corazón, todo todo... Me gusta mucho hacerte reír, que me hagas reír y recordarte siempre lo mucho que te amo, por eso mismo este no es el final de la app... la voy a ir actualizando y metiéndole más código para dejarte más mensajitos con el pasar del tiempo :3... Cada vez que entres más adelante, seguro encuentras algo nuevo jksajka... Tu sonrisa es mi lugar seguro y siempre voy a buscar la forma de hacerte feli... Te amo con todo mi corazón..'],sig:'Te amo muchio, me gusta tu sonrisa ✦'},
  ]},
  sad:{name:'Triste',emoji:'😔',color:'linear-gradient(135deg,#D6E8F8,#B8D8F0)',msgs:[
    {body:['mi amor... si entraste aquí es porque probablemente estás teniendo un día difícil o te sientes bajoneada... y solo quiero decirte que está bien no estar bien todo el tiempo... No te presiones por intentar sonreír o por querer cambiar tu ánimo rápido si no te nace... Aquí puedes dejar caer los hombros, desconectarte un ratito y simplemente sentir lo que tengas que sentir... Yo no me voy a mover de tu lado...'],sig:'Jamás me iré de tu lado.. ✦'},
    {body:['Si tienes ganas de llorar, hazlo... de verdad, saca todo eso que tienes guardado... A veces pensamos que aguantarse las lágrimas nos hace fuertes, pero es todo lo contrario mi amor :cc ... Dejar salir lo que te duele y aceptar que estás triste también requiere muchísima valentía... No tienes que ser fuerte todo el tiempo, mi amor, y mucho menos conmigo... Suelta esa carga un ratito, que yo aquí te cuido..."'],sig:'Te cuidaré siempre ✦'},
    {body:['Sé que a veces, cuando estamos tristes, sentimos que nadie nos entiende o que estamos completamente solos con nuestra cabeza... pero quiero recordarte que me tienes a mí... Sea lo que sea por lo que estés pasando, sea grande o chiquito, no tienes que cargarlo tú sola... Estoy aquí para escucharte si quieres hablar, o para quedarnos en silencio si eso prefieres... pero nunca te olvides de que estamos juntos en esto..'],sig:'Hablalo conmigo...si? ✦'},
    {body:['De verdad, me justaría estar ahí mismo contigo para abrazote fuerte y no soltarte hasta que te sientas mejor... pero cierra los ojos un ratito y siente este mensaje como si fuera ese abrazo... Imagina que estoy ahí, dándote un besito en la frente y diciéndote que todo va a estar bien... No puedo quitarte el dolor mágicamente, pero sí puedo prometerte que te voy a sostener a la distancia cada vez que lo necesites... Te extraño :c'],sig:'Todo estará biem mientras estés conmigo... promesita ✦'},
    {body:['Sé perfectamente lo feo que se siente estar atrapado en uno de esos dias... A mí también me ha pasado que siento la cabeza pesidísima, parece que se me va a caer de tanto pensar jksjs, que no tengo ganas de hacer nada y que todo se ve cuesta arriba... En esos momentos, lo que más me ayudaba era ponerme los audífonos, escuchar un disco de Radiohead entero, o jugar al LoLcito y simplemente dejar que el tiempo pasara sin presionarme por estar bien... Aprendí que la tristeza no se quita a la fuerza... se supera dándote permiso de sentirla un ratito y sabiendo que, tarde o temprano, la tormenta siempre pasa...'],sig:'Deberiamos jugar al LoL :b ✦'},
    {body:['Esto que estás sintiendo ahora mismo no va a durar para siempre mi amor... las nubes negras terminan moviéndose y el sol vuelve a salir, aunque ahorita lo veas todo gris y todo triste... No te preocupes por lo que pueda pasar mañana ni por cuándo vas a volver a sonreír, solo vive este momento a tu ritmo. Lo único que quiero que tengas súper claro es que, cuando toda esto pase y estés lista para volver a salir al mundo, yo voy a estar aquí mismo... exactamente en el mismo lugar, esperándote...'],sig:'Claro que no te dejaré sola cuando estes triste.. ✦'},
    {body:['Si pudiera teletransportarme y estar ahí contigo en este mismo segundo, lo primero que haría sería darte un abrazote del oso sin decir nada... Te tomaria de los cachetitos, te daría un besito en la frente y te prepararía algo caliente para que te relajes... Nos echaríamos a ver una película random o simplemente me quedaría acostado a tu lado abrazándote hasta que te quedes dormida... No puedo estar ahí físicamente justo ahora, pero quiero que te imagines esa escena y sepas que mis ganas de cuidarte sí están contigo...'],sig:'Ojalá poder estar ahi, daria todo por eso ✦'},
    {body:['Sé que cuando estás triste es fácil olvidarse de lo increíble que eres... la cabeza se pone pesada y nos hace dudar de todo. Pero yo estoy aquí para recordarte la verdad, y la verdad es que eres una chica súper fuerte, inteligente y con un corazón enorme que se preocupa por todos... Admiro demasiado cómo le echas ganas a tus cosas, incluso cuando te cuesta... No dejes que un mal día te haga dudar de lo valiosa y hermosa que eres, si mi amor??.. :c'],sig:'Es una de los miles de motivos por los que estoy enamorado de ti..✦'},
    {body:['Oye mi vida ... cuchame un ratito. Sé que ahorita todo se siente horrible y estas tiste, pero quiero que te grabes algo muy bien en la cabeza.. te amo un montooooooon. Eso no cambia por nada nada del mundo, ni por un mal día, ni por la distancia, ni por cómo te sientas hoy... Mi amor por ti está intacto y aquí me voy a quedar pase lo que pase, ¿ya? No te olvides de eso...'],sig:'Te amo con toda mi alma ✦'},
    {body:['De vdd quiero agradecerte por dejarme ver este lado tuyo... Sé que a veces cuesta mostrarse vulnerable o decir que las cosas no están bien, pero que confíes en mí cuando estás mal es de las cosas más importantes para mí... Me hace sentir que de verdad somos un equipo y que puedo ser ese lugar seguro donde no tienes que fingir nada... Gracias por dejarme cuidarte y por hacerme parte de tus días, tanto en los buenos como en los tristes..'],sig:'Quiero ser tu lugar seguro ✦'},
    {body:['Aunque no lo sepas, tú me has enseñado muchísimo sobre esto... Ver cómo eres de empática y el gran corazón que tienes me hizo entender que estar triste no tiene nada de malo, que es parte de ser humanos y que a veces solo se necesita un respiro... Me enseñaste que no hay que resolverlo todo de golpe, sino ir paso a paso... Tu forma de ser me inspira un montón mi amor, y me ayudó a entender mejor mis propios días grises... Eres increible'],sig:'De verdad eres increíble ✦'},
    {body:['Tómate todo el tiempo que necesites, mi vida... No sientas que tienes que "ponerte bien" rápido por mí, ni que me vas a aburrir o a cansar por estar así. A mí me importas tú completa, con tus días felices y también con tus días tristes. No hay prisa ninguna... Si hoy solo quieres estar desconectada o hablar poquito, está bien. Yo no tengo ningún apuro aquí me voy a quedar esperándote...'],sig:'Te amaré pase lo que pase.. ✦'},
    {body:['A mí también me pasa que a veces me entra una depresión exótica de la nada lol... Momentos en los que voy en el metropolitano escuchando música y la cabeza me empieza a dar mil vueltas, o días en los que siento que por más que intente hacer las cosas bien, todo me sale terrible por  mas de que me esfuerce y me frustro un montón :c ... Te lo cuento porque quiero que veas que sentirnos así es parte de ser humanos pq no somos robots. Yo también tengo mis días grises mi amor, y es completamente normal...'],sig:'Estoy bien sabiendo que tu estas ahí :3 ✦'},

let currentMood=null, currentIdx=0;

function openMood(key){
  currentMood=key;
  const m=MOODS[key];
  document.getElementById('ml-kicker').textContent=`${m.emoji} mensajes`;
  document.getElementById('ml-title').textContent=m.name;
  const cards=document.getElementById('ml-cards');
  cards.innerHTML='';
  m.msgs.forEach((msg,i)=>{
    const d=document.createElement('div');
    d.className='msg-card';
    d.innerHTML=`<div class="msg-card-num">Mensaje ${i+1} de 15</div>
      <div class="msg-card-preview">${msg.body[0]}</div>
      <div class="msg-card-arrow">Leer →</div>`;
    d.onclick=()=>openMsg(i);
    cards.appendChild(d);
  });
  show('s-list');
}

function openMsg(idx){
  currentIdx=idx;
  const m=MOODS[currentMood];
  const msg=m.msgs[idx];
  document.getElementById('det-num').textContent=`Mensaje ${idx+1} de 15`;
  document.getElementById('det-moodname').textContent=`${m.emoji} ${m.name}`;
  document.getElementById('det-emoji').textContent=m.emoji;
  document.getElementById('det-label').textContent=`Para cuando estás ${m.name.toLowerCase()}`;
  document.getElementById('det-hero').style.background=m.color;
  document.getElementById('det-bubble').innerHTML=
    msg.body.map(p=>`<p>${p}</p>`).join('')+
    `<div class="bubble-sig">${msg.sig}</div>`;
  document.getElementById('btn-prev').disabled=idx===0;
  document.getElementById('btn-next').disabled=idx===14;
  document.getElementById('det-inner').scrollTop=0;
  show('s-detail');
}

function navMsg(dir){const n=currentIdx+dir;if(n>=0&&n<15)openMsg(n);}

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
</script>
