<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>¿Qué tanto me conoces? 🎯</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FDF6F0;--surface:#fff;
  --pink:#F4A7B9;--pink-d:#E07A9A;
  --lila:#C9B8E8;--lila-d:#9B7FD4;
  --text:#2D2230;--text2:#7A6875;--text3:#B5A8B0;
  --correct:#7BC67E;--correct-bg:#F0FBF0;
  --wrong:#E07A9A;--wrong-bg:#FFF0F4;
  --radius:20px;--shadow:0 4px 24px rgba(180,120,160,.12);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);overscroll-behavior:none;}
.shell{max-width:390px;height:100dvh;margin:0 auto;display:flex;flex-direction:column;overflow:hidden;position:relative;}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .28s ease,transform .28s ease;transform:translateY(12px);}
.screen.active{opacity:1;pointer-events:all;transform:translateY(0);}
.inner{flex:1;overflow-y:auto;padding:1.5rem 1.4rem 3rem;}
.inner::-webkit-scrollbar{display:none;}

/* TOP ROW */
.top-row{display:flex;align-items:center;gap:.9rem;margin-bottom:1.5rem;}
.back-btn{width:40px;height:40px;border-radius:50%;background:var(--surface);box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;border:none;text-decoration:none;color:var(--text);cursor:pointer;}
.top-kicker{font-size:.66rem;letter-spacing:.13em;text-transform:uppercase;color:var(--text3);}
.top-title{font-family:'DM Serif Display',serif;font-size:1.5rem;color:var(--text);line-height:1.15;}
.top-title em{font-style:italic;color:var(--pink-d);}

/* INTRO */
.intro-hero{background:linear-gradient(135deg,#EAD8F8,#C9B8E8);border-radius:var(--radius);padding:2rem 1.5rem;text-align:center;margin-bottom:1.4rem;}
.intro-emoji{font-size:3rem;margin-bottom:.6rem;}
.intro-title{font-family:'DM Serif Display',serif;font-size:1.6rem;color:var(--text);line-height:1.2;margin-bottom:.4rem;}
.intro-title em{font-style:italic;color:var(--lila-d);}
.intro-sub{font-size:.85rem;color:var(--text2);line-height:1.6;}
.intro-meta{display:flex;justify-content:center;gap:1.5rem;margin-top:1.2rem;}
.intro-stat{display:flex;flex-direction:column;align-items:center;gap:.2rem;}
.intro-stat span:first-child{font-family:'DM Serif Display',serif;font-size:1.4rem;color:var(--text);}
.intro-stat span:last-child{font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);}
.start-btn{width:100%;border:none;background:linear-gradient(135deg,var(--pink),var(--lila));color:#fff;font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:500;border-radius:14px;padding:1rem;cursor:pointer;margin-top:1rem;transition:transform .15s;}
.start-btn:active{transform:scale(.97);}

/* QUIZ */
.progress-wrap{margin-bottom:1.2rem;}
.progress-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem;}
.progress-label{font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);}
.progress-bar{height:5px;background:#EDE8F5;border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--pink),var(--lila));border-radius:3px;transition:width .4s ease;}

.question-card{background:var(--surface);border-radius:var(--radius);padding:1.6rem 1.4rem;box-shadow:var(--shadow);margin-bottom:1.1rem;}
.q-num{font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:.6rem;}
.q-text{font-family:'DM Serif Display',serif;font-size:1.2rem;line-height:1.45;color:var(--text);}

.opts{display:flex;flex-direction:column;gap:.7rem;}
.opt{border:1.5px solid rgba(200,160,180,.2);background:var(--surface);border-radius:14px;padding:.95rem 1.2rem;font-size:.92rem;color:var(--text);cursor:pointer;text-align:left;transition:border-color .2s,background .2s;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:.8rem;}
.opt-letter{width:26px;height:26px;border-radius:50%;background:#F5F0F8;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:500;color:var(--text3);flex-shrink:0;transition:background .2s,color .2s;}
.opt:hover{border-color:var(--pink);background:#FFF5F8;}
.opt:hover .opt-letter{background:var(--pink);color:#fff;}
.opt.correct{border-color:var(--correct);background:var(--correct-bg);}
.opt.correct .opt-letter{background:var(--correct);color:#fff;}
.opt.wrong{border-color:var(--wrong);background:var(--wrong-bg);}
.opt.wrong .opt-letter{background:var(--wrong);color:#fff;}
.opt:disabled{cursor:default;}

/* RESULT */
.result-hero{border-radius:var(--radius);padding:2.2rem 1.5rem;text-align:center;margin-bottom:1.2rem;}
.result-emoji{font-size:3.5rem;margin-bottom:.8rem;}
.result-score{font-family:'DM Serif Display',serif;font-size:4rem;color:var(--text);line-height:1;}
.result-total{font-size:.85rem;color:var(--text3);margin-top:.2rem;margin-bottom:.6rem;}
.result-label{font-family:'DM Serif Display',serif;font-style:italic;font-size:1.15rem;color:var(--text2);}
.result-msg{background:var(--surface);border-radius:var(--radius);padding:1.4rem 1.5rem;box-shadow:var(--shadow);margin-bottom:1rem;}
.result-msg p{font-family:'DM Serif Display',serif;font-style:italic;font-size:1rem;line-height:1.85;color:var(--text);}
.result-sig{font-family:'DM Sans',sans-serif;font-style:normal;font-size:.78rem;color:var(--pink-d);font-weight:500;margin-top:.8rem;}
.result-btns{display:flex;gap:.7rem;}
.rbtn{flex:1;border:none;border-radius:14px;padding:.9rem;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;cursor:pointer;transition:transform .15s;}
.rbtn:active{transform:scale(.97);}
.rbtn.retry{background:var(--surface);color:var(--text2);box-shadow:var(--shadow);}
.rbtn.home{background:linear-gradient(135deg,var(--pink),var(--lila));color:#fff;}
</style>
</head>
<body>
<div class="shell">

  <!-- ══ INTRO ══ -->
  <div class="screen active" id="s-intro">
    <div class="inner" style="padding-top:2.5rem;">
      <div class="top-row">
        <a class="back-btn" href="index.html">←</a>
        <div>
          <div class="top-kicker">quiz</div>
          <div class="top-title">¿Qué tanto me<br><em>conoces?</em></div>
        </div>
      </div>
      <div class="intro-hero">
        <div class="intro-emoji">🎯</div>
        <div class="intro-title">Demuestra que<br><em>me conoces</em></div>
        <p class="intro-sub">Preguntas sobre nuestra historia, sobre mí y sobre nosotros.</p>
        <div class="intro-meta">
          <div class="intro-stat"><span>20</span><span>preguntas</span></div>
          <div class="intro-stat"><span>4</span><span>opciones</span></div>
          <div class="intro-stat"><span>💕</span><span>sin límite</span></div>
        </div>
      </div>
      <button class="start-btn" onclick="startQuiz()">Empezar →</button>
    </div>
  </div>

  <!-- ══ QUIZ ══ -->
  <div class="screen" id="s-quiz">
    <div class="inner">
      <div class="top-row">
        <button class="back-btn" onclick="show('s-intro')">←</button>
        <div>
          <div class="top-kicker" id="q-kicker"></div>
          <div class="top-title" id="q-title" style="font-size:1.2rem;"></div>
        </div>
      </div>
      <div class="progress-wrap">
        <div class="progress-top">
          <span class="progress-label" id="prog-label">Pregunta 1 de 10</span>
          <span class="progress-label" id="prog-score">0 correctas</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
      </div>
      <div class="question-card">
        <div class="q-num" id="q-num"></div>
        <div class="q-text" id="q-text"></div>
      </div>
      <div class="opts" id="opts"></div>
    </div>
  </div>

  <!-- ══ RESULT ══ -->
  <div class="screen" id="s-result">
    <div class="inner">
      <div class="top-row">
        <button class="back-btn" onclick="show('s-intro')">←</button>
        <div>
          <div class="top-kicker">resultado</div>
          <div class="top-title">Tu <em>puntaje</em></div>
        </div>
      </div>
      <div class="result-hero" id="res-hero">
        <div class="result-emoji" id="res-emoji"></div>
        <div class="result-score" id="res-score"></div>
        <div class="result-total" id="res-total"></div>
        <div class="result-label" id="res-label"></div>
      </div>
      <div class="result-msg">
        <p id="res-msg"></p>
        <div class="result-sig">Tuyo, siempre ✦</div>
      </div>
      <div class="result-btns">
        <button class="rbtn retry" onclick="startQuiz()">Intentar de nuevo</button>
        <button class="rbtn home" onclick="window.location.href='index.html'">Inicio →</button>
      </div>
    </div>
  </div>

</div>
<script>
const QUESTIONS = [
  // ── LAS 10 ORIGINALES ──
  {
    q: '¿Cómo se llama el amigo en cuyo cumpleaños nos conocimos?',
    opts: ['Diego','Joao','Josue','Paolo'],
    ans: 1
  },
  {
    q: '¿Cuál fue la "excusa" para escribirle por primera vez?',
    opts: ['Una foto','Un meme','Una botella','Una partida de LoL'],
    ans: 2
  },
  {
    q: '¿A dónde fuimos en nuestra primera salida juntos?',
    opts: ['Barranco','San Isidro','El centro','Miraflores'],
    ans: 3
  },
  {
    q: '¿Por qué pedí un taxi en vez de volver en metropolitano?',
    opts: ['Era muy tarde','No había otra opción','Quería pasar más tiempo a solas','Tenía mucha prisa'],
    ans: 2
  },
  {
    q: '¿Qué le hice en el taxi que le gustó?',
    opts: ['Le di la mano','Masajitos en la cabeza','Le di un beso','Le acomodé el cabello'],
    ans: 1
  },
  {
    q: '¿En qué app fue la llamada donde le confesé que me gusta mucho?',
    opts: ['WhatsApp','Telegram','Instagram','Discord'],
    ans: 3
  },
  {
    q: '¿Qué serie vimos primero?',
    opts: ['Attack on Titan','Horimiya','Arcane','Stranger Things'],
    ans: 2
  },
  {
    q: '¿Qué hicimos antes de ser novios para conocernos mejor?',
    opts: ['Un album','Un blog de notas de cosas que queríamos saber el uno del otro','Un grupo de fotos','Un diario'],
    ans: 1
  },
  {
    q: '¿Cuándo le propuse ser mi novia?',
    opts: ['01 de junio','03 de junio','04 de junio','02 de junio'],
    ans: 3
  },
  {
    q: '¿Dónde estábamos cuando le pregunté si quería ser mi novia?',
    opts: ['En el ollanta','En mi habitación','En casa de ella','En el taxi'],
    ans: 1
  },

  // ── PARA RELLENAR — reemplaza [pregunta], [opción] y cambia `ans` al índice correcto (0,1,2,3) ──
  {
    q: 'Si voy en el Metropolitano ignorando al mundo con los audífonos puestos, ¿qué banda o artista es más probable que esté escuchando?',
    opts: ['RadioHead','Panchiko','Bad Bunny','Nirvana'],
    ans: 0
  },
  {
    q: '¿Cual es mi Vocaloid favorito?',
    opts: ['KAITO','Kagamine Rin','Kagamine Len','Hatsune Miku'],
    ans: 1
  },
  {
    q: '¿Cuál de estos planes o detalles a futuro me hace más ilusión compartir contigo?',
    opts: ['Ver cómo esta app va creciendo y actualizándose para los dos', 'Casarnos e irnos a vivir juntos', 'Irnos de Viaje a Lunahuaná', 'Ir a un torneo de LoL juntos'],
    ans: 1
  },
  {
    q: '¿Cual es mi comida favorita?',
    opts: ['Aji de Gallina','Milanesa','Arroz con Pollo','Arroz Chaufa'],
    ans: 3
  },
  {
    q: '¿Quién es mi jugador de LoL favorito?',
    opts: ['Keria','Deft','Faker','Gumayusi'],
    ans: 1
  },
  {
    q: '¿Que le dice un pan a otro pan?',
    opts: ['Necesitamos ayuda','Vaca minando','Te presento una amiga','Por que esperaba la venida del señor'],
    ans: 2
  },
  {
    q: '¿Que personaje de LoL juego mas?',
    opts: ['Kalista','Ezreal','Sylas','Vayne'],
    ans: 1
  },
  {
    q: 'Si estamos hablando y de repente te pones triste, abrumada o calladita, ¿cuál va a ser siempre mi reacción?',
    opts: ['Darte tu espacio e irme a jugar otra cosa', 'Estar ahí para ti siempre, recordarte que no hay prisa y cuidarte', 'Preguntarte 80 veces seguidas "¿qué tienes?"', 'Ponerme a hablar de cualquier cosa hasta que te aburras'],
    ans: 1
  },
  {
    q: 'Detrás de todas las horas que le meto al estudio y de esforzarme tanto en la universidad, ¿cuál es la promesa más importante que te hice y que me motiva todos los días?',
    opts: [
      'Esforzarme al máximo para que en el futuro podamos por fin irnos a vivir juntos',
      'Volverme millonario y comprarme una casa con un cuarto solo para jugar LoL',
      'Terminar la carrera rápido solo para no volver a ver un libro en mi vida',
      'Aprender a programar para hackear cuentas de videojuegos'],
    ans: 0
  },
  {
    q: '¿Que línea juego más en LoL?',
    opts: ['Support','Jungla','ADC','Midlaner'],
    ans: 2
  },
];

const RESULTS = [
  { min:0, max:5, emoji:'😑', label:'Okei..', color:'linear-gradient(135deg,#FDE9C8,#FAE3A0)',
    msg:'Ya sabía que me odiabas.. No hacia falta que me lo demuestres :c' },
  { min:6, max:14, emoji:'🙂', label:'Bien, pero se puede más', color:'linear-gradient(135deg,#D6E8F8,#B8D8F0)',
    msg:'Estuviste cerca mi vida jksjks, pero sé que puedes hacerlo muchísimo mejor. Aún hay un montón de secretos y detalles sobre mí que te faltan descubrir, y me emociona demasiado saber que tenemos todo el tiempo del mundo para seguir conociéndonos pasito a pasito. ¡Inténtalo otra vez, yo confío en ti! 💕' },
  { min:15, max:19, emoji:'🥰', label:'Casi perfecta', color:'linear-gradient(135deg,#EAD8F8,#C9B8E8)',
    msg:'¡Casi perfecto, mi amor! De verdad me dejas increíblemente orgulloso... Ver que me conoces tan pero tan bien significa el mundo entero para mí. Me demuestra lo mucho que me prestas atención y el espacio tan bonito que tengo en tu cabecita. Estuviste a nada del puntaje perfecto, ¡un intento más y lo dejas en 10! Te amo un montón... ✦' },
  { min:20, max:20, emoji:'🏆', label:'¡Me conoces de memoria!', color:'linear-gradient(135deg,#F8D6E8,#F4A7B9)',
    msg:'No tengo palabras... Sacaste un 20/20 perfecto, mi vida. Demostraste que me conoces de una forma que nadie más en este mundo podría hacerlo, desde mis tonterías diarias hasta esa promesa que guardo en el corazón de esforzarme al máximo estudiando para que muy pronto podamos irnos a vivir juntos. Eres mi lugar seguro, mi personita ideal y saber que me entiendes así me desarma por completo. Te amo con toda mi alma, hoy y siempre... MWAHH 🏆💕' },
];

let qIdx=0, score=0, answered=false;

function startQuiz(){ qIdx=0; score=0; renderQ(); show('s-quiz'); }

function renderQ(){
  answered=false;
  const q=QUESTIONS[qIdx];
  const pct=Math.round((qIdx/QUESTIONS.length)*100);
  document.getElementById('q-kicker').textContent=`Pregunta ${qIdx+1} de ${QUESTIONS.length}`;
  document.getElementById('q-title').textContent='';
  document.getElementById('q-num').textContent=`#${qIdx+1}`;
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('prog-label').textContent=`Pregunta ${qIdx+1} de ${QUESTIONS.length}`;
  document.getElementById('prog-score').textContent=`${score} correcta${score!==1?'s':''}`;
  document.getElementById('prog-fill').style.width=pct+'%';

  const letters=['A','B','C','D'];
  const wrap=document.getElementById('opts');
  wrap.innerHTML='';
  q.opts.forEach((o,i)=>{
    const btn=document.createElement('button');
    btn.className='opt';
    btn.innerHTML=`<span class="opt-letter">${letters[i]}</span>${o}`;
    btn.onclick=()=>answer(i,btn);
    wrap.appendChild(btn);
  });
}

function answer(i, btn){
  if(answered)return;
  answered=true;
  const q=QUESTIONS[qIdx];
  const allOpts=document.querySelectorAll('.opt');
  allOpts.forEach(b=>b.disabled=true);
  allOpts[q.ans].classList.add('correct');
  if(i!==q.ans){ btn.classList.add('wrong'); }
  else { score++; }
  setTimeout(()=>{
    qIdx++;
    if(qIdx<QUESTIONS.length) renderQ();
    else showResult();
  },1000);
}

function showResult(){
  const res=RESULTS.find(r=>score>=r.min&&score<=r.max);
  document.getElementById('res-hero').style.background=res.color;
  document.getElementById('res-emoji').textContent=res.emoji;
  document.getElementById('res-score').textContent=score;
  document.getElementById('res-total').textContent=`de ${QUESTIONS.length} preguntas`;
  document.getElementById('res-label').textContent=res.label;
  document.getElementById('res-msg').textContent=res.msg;
  show('s-result');
}

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
</script>
</body>
</html>
