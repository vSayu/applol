<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Cápsula del tiempo 💌</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FDF6F0;--surface:#fff;
  --pink:#F4A7B9;--pink-d:#E07A9A;
  --lila:#C9B8E8;--lila-d:#9B7FD4;
  --text:#2D2230;--text2:#7A6875;--text3:#B5A8B0;
  --radius:20px;--shadow:0 4px 24px rgba(180,120,160,.12);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);overscroll-behavior:none;}
.shell{max-width:390px;height:100dvh;margin:0 auto;display:flex;flex-direction:column;overflow:hidden;position:relative;}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .28s ease,transform .28s ease;transform:translateY(12px);}
.screen.active{opacity:1;pointer-events:all;transform:translateY(0);}
.inner{flex:1;overflow-y:auto;padding:1.5rem 1.4rem 3rem;}
.inner::-webkit-scrollbar{display:none;}

.top-row{display:flex;align-items:center;gap:.9rem;margin-bottom:1.5rem;}
.back-btn{width:40px;height:40px;border-radius:50%;background:var(--surface);box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;border:none;text-decoration:none;color:var(--text);cursor:pointer;}
.top-kicker{font-size:.66rem;letter-spacing:.13em;text-transform:uppercase;color:var(--text3);}
.top-title{font-family:'DM Serif Display',serif;font-size:1.5rem;color:var(--text);line-height:1.15;}
.top-title em{font-style:italic;color:var(--pink-d);}

/* INTRO */
.intro-desc{font-size:.9rem;color:var(--text2);line-height:1.7;margin-bottom:1.6rem;}

/* CAPSULAS */
.capsulas{display:flex;flex-direction:column;gap:1.1rem;}

.capsula{border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);}

.cap-front{padding:1.4rem 1.5rem;display:flex;align-items:center;gap:1.1rem;cursor:pointer;transition:filter .15s;}
.cap-front:active{filter:brightness(.97);}

.cap-icon-wrap{width:52px;height:52px;border-radius:14px;background:rgba(255,255,255,.45);display:flex;align-items:center;justify-content:center;font-size:1.7rem;flex-shrink:0;}

.cap-info{flex:1;}
.cap-milestone{font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(60,30,50,.45);margin-bottom:.25rem;}
.cap-title{font-family:'DM Serif Display',serif;font-size:1.1rem;color:var(--text);line-height:1.2;margin-bottom:.25rem;}
.cap-date{font-size:.75rem;color:rgba(60,30,50,.4);}

.cap-badge{font-size:.65rem;font-weight:500;padding:.3rem .7rem;border-radius:20px;flex-shrink:0;}
.badge-open{background:rgba(123,198,126,.2);color:#3a7a3d;}
.badge-locked{background:rgba(180,160,200,.2);color:var(--lila-d);}

/* BODY expandible */
.cap-body{display:none;padding:1.4rem 1.5rem 1.8rem;border-top:1px solid rgba(255,255,255,.5);}
.cap-body.show{display:block;}

.cap-body p{font-family:'DM Serif Display',serif;font-style:italic;font-size:1rem;line-height:1.9;color:var(--text);margin-bottom:1rem;}
.cap-body p:last-of-type{margin-bottom:0;}
.cap-sig{font-family:'DM Sans',sans-serif;font-style:normal;font-size:.76rem;color:var(--pink-d);font-weight:500;margin-top:1rem;}

.locked-msg{text-align:center;padding:.8rem 0;}
.locked-msg .lock-icon{font-size:2rem;margin-bottom:.5rem;}
.locked-msg p{font-size:.85rem;color:var(--text3);line-height:1.65;}
.locked-msg strong{color:var(--lila-d);font-weight:500;}

/* colors */
.c1{background:linear-gradient(135deg,#F8E0EC,#FDDCCC);}
.c2{background:linear-gradient(135deg,#EAD8F8,#C9B8E8);}
.c3{background:linear-gradient(135deg,#D6F0E8,#C8E6DA);}
.c4{background:linear-gradient(135deg,#FDE9C8,#FAE3A0);}

/* DETAIL SCREEN */
.det-hero{border-radius:var(--radius);padding:1.8rem 1.5rem;text-align:center;margin-bottom:1.2rem;}
.det-icon{font-size:3rem;margin-bottom:.5rem;}
.det-milestone{font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(60,30,50,.4);margin-bottom:.3rem;}
.det-title{font-family:'DM Serif Display',serif;font-size:1.6rem;color:var(--text);line-height:1.2;}
.det-date{font-size:.78rem;color:var(--text3);margin-top:.4rem;}
.bubble{background:var(--surface);border-radius:18px 18px 18px 4px;padding:1.4rem 1.5rem;box-shadow:var(--shadow);}
.bubble p{font-family:'DM Serif Display',serif;font-style:italic;font-size:1rem;line-height:1.9;color:var(--text);}
.bubble p+p{margin-top:1rem;}
.bubble-sig{font-family:'DM Sans',sans-serif;font-style:normal;font-size:.78rem;color:var(--pink-d);font-weight:500;margin-top:.9rem;}
.det-back{width:100%;border:none;background:var(--surface);color:var(--text2);font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:500;border-radius:14px;padding:.9rem;cursor:pointer;box-shadow:var(--shadow);margin-top:1rem;}

.locked-detail{text-align:center;padding:3rem 1rem;}
.locked-detail .lock{font-size:3.5rem;margin-bottom:1rem;}
.locked-detail h3{font-family:'DM Serif Display',serif;font-size:1.4rem;color:var(--text);margin-bottom:.6rem;}
.locked-detail p{font-size:.9rem;color:var(--text2);line-height:1.7;}
.locked-detail strong{color:var(--pink-d);font-weight:400;}
</style>
</head>
<body>
<div class="shell">

  <!-- ══ LIST ══ -->
  <div class="screen active" id="s-list">
    <div class="inner" style="padding-top:2.5rem;">
      <div class="top-row">
        <a class="back-btn" href="index.html">←</a>
        <div>
          <div class="top-kicker">cápsula del tiempo</div>
          <div class="top-title">Sobres para<br><em>el futuro</em></div>
        </div>
      </div>
      <p class="intro-desc">Cada sobre se abre en una fecha especial nuestra. Algunos ya están listos — otros todavía están esperando ese momento 💕</p>
      <div class="capsulas" id="capsulas"></div>
    </div>
  </div>

  <!-- ══ DETAIL ══ -->
  <div class="screen" id="s-detail">
    <div class="inner" id="det-inner">
      <div class="top-row">
        <button class="back-btn" onclick="show('s-list')">←</button>
        <div>
          <div class="top-kicker">cápsula del tiempo</div>
          <div class="top-title" id="det-top-title"></div>
        </div>
      </div>
      <div id="det-content"></div>
      <button class="det-back" onclick="show('s-list')">← Volver a los sobres</button>
    </div>
  </div>

</div>
<script>
const CAPSULAS = [
  {
    id: 1,
    icon: '🌸',
    colorClass: 'c1',
    milestone: 'Primer mes',
    title: 'Un mes contigo',
    date: '02 de julio, 2026',
    unlock: new Date('2026-07-02T00:00:00'),
    msgs: [
      '[Escribe aquí lo que quieres que lea el día que cumplan un mes. ¿Qué aprendiste de ella en estos 30 días? ¿Cuál fue tu momento favorito?]',
      '[Segundo párrafo — algo sobre lo que imaginas para los meses que vienen juntos.]'
    ],
    sig: 'Tuyo, siempre ✦'
  },
  {
    id: 2,
    icon: '💜',
    colorClass: 'c2',
    milestone: 'Tres meses',
    title: 'Noventa días',
    date: '02 de septiembre, 2026',
    unlock: new Date('2026-09-02T00:00:00'),
    msgs: [
      '[Para los 3 meses. ¿En qué ha crecido la relación? ¿Qué versión de ella descubriste que no conocías al principio?]',
      '[Algo sobre un momento que pasó entre los dos en estos meses que nunca olvidarás.]'
    ],
    sig: 'Con todo lo que tengo ✦'
  },
  {
    id: 3,
    icon: '✦',
    colorClass: 'c3',
    milestone: 'Seis meses',
    title: 'Medio año',
    date: '02 de diciembre, 2026',
    unlock: new Date('2026-12-02T00:00:00'),
    msgs: [
      '[Para los 6 meses. Escríbele algo que solo puede existir después de medio año juntos — algo que no podrías haber dicho el día 1.]',
      '[Algo sobre el futuro que los dos quieren — concreto, real, tuyo.]'
    ],
    sig: 'Siempre tuyo ✦'
  },
  {
    id: 4,
    icon: '🏆',
    colorClass: 'c4',
    milestone: 'Un año',
    title: 'Nuestro primer año',
    date: '02 de junio, 2027',
    unlock: new Date('2027-06-02T00:00:00'),
    msgs: [
      '[El más especial. Un año. Escríbele algo que la deje sin palabras — todo lo que vivieron, todo lo que aprendieron, todo lo que son juntos ahora.]',
      '[Cierra con algo sobre el futuro. No el año pasado — el que viene.]'
    ],
    sig: 'Todo tuyo, para siempre ✦'
  },
];

const now = new Date();

function buildList(){
  const wrap = document.getElementById('capsulas');
  wrap.innerHTML = '';
  CAPSULAS.forEach(c => {
    const isOpen = now >= c.unlock;
    const div = document.createElement('div');
    div.className = `capsula ${c.colorClass}`;
    div.innerHTML = `
      <div class="cap-front" onclick="openCap(${c.id})">
        <div class="cap-icon-wrap">${c.icon}</div>
        <div class="cap-info">
          <div class="cap-milestone">${c.milestone}</div>
          <div class="cap-title">${c.title}</div>
          <div class="cap-date">${c.date}</div>
        </div>
        <span class="cap-badge ${isOpen?'badge-open':'badge-locked'}">${isOpen?'Abrir':'🔒'}</span>
      </div>`;
    wrap.appendChild(div);
  });
}

function openCap(id){
  const c = CAPSULAS.find(x=>x.id===id);
  const isOpen = now >= c.unlock;
  document.getElementById('det-top-title').textContent = c.title;

  const content = document.getElementById('det-content');
  if(isOpen){
    content.innerHTML = `
      <div class="det-hero ${c.colorClass}">
        <div class="det-icon">${c.icon}</div>
        <div class="det-milestone">${c.milestone}</div>
        <div class="det-title">${c.title}</div>
        <div class="det-date">${c.date}</div>
      </div>
      <div class="bubble">
        ${c.msgs.map(p=>`<p>${p}</p>`).join('')}
        <div class="bubble-sig">${c.sig}</div>
      </div>`;
  } else {
    const days = Math.ceil((c.unlock - now) / 86400000);
    content.innerHTML = `
      <div class="locked-detail">
        <div class="lock">🔒</div>
        <h3>${c.title}</h3>
        <p>Este sobre se abre el <strong>${c.date}</strong>.<br><br>
        Faltan <strong>${days} día${days!==1?'s':''}</strong> para poder leerlo.<br><br>
        Vuelve ese día 🌸</p>
      </div>`;
  }
  document.getElementById('det-inner').scrollTop = 0;
  show('s-detail');
}

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

buildList();
</script>
</body>
</html>
